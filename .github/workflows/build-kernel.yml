name: Build kebab kernel Image with SukiSU-Ultra

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-kernel.yml
      - build.lock
      - configs/**
      - patches/**
      - scripts/build-kernel.sh

permissions:
  contents: read

concurrency:
  group: kebab-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: LineageOS 23.2 / kebab / Image only
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      CLANG_VERSION: clang-r563880c
      KERNEL_DIR: /tmp/kebab-kernel
      OUT_DIR: /tmp/kebab-out
      TOOLCHAIN_DIR: /tmp/kebab-clang

    steps:
      - name: Check out build configuration
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Load immutable source lock
        shell: bash
        run: |
          set -a
          source build.lock
          set +a
          for name in KERNEL_COMMIT SUKISU_COMMIT ANYKERNEL3_COMMIT TOOLCHAIN_COMMIT; do
            value="${!name}"
            [[ "${value}" =~ ^[0-9a-f]{40}$ ]] || {
              echo "Invalid ${name}: ${value}" >&2
              exit 1
            }
            echo "${name}=${value}" >> "${GITHUB_ENV}"
          done

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            bc bison build-essential ca-certificates device-tree-compiler \
            flex git libelf-dev libssl-dev lz4 python3 rsync zstd

      - name: Fetch locked LineageOS kernel source
        run: |
          git init "${KERNEL_DIR}"
          git -C "${KERNEL_DIR}" remote add origin \
            https://github.com/LineageOS/android_kernel_oneplus_sm8250.git
          git -C "${KERNEL_DIR}" fetch --depth=1 origin "${KERNEL_COMMIT}"
          git -C "${KERNEL_DIR}" checkout --detach FETCH_HEAD
          test "$(git -C "${KERNEL_DIR}" rev-parse HEAD)" = "${KERNEL_COMMIT}"

      - name: Fetch locked Android 16 Clang toolchain
        run: |
          toolchain_repo="${RUNNER_TEMP}/clang-prebuilts"
          git init "${toolchain_repo}"
          git -C "${toolchain_repo}" remote add origin \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86
          git -C "${toolchain_repo}" sparse-checkout init
          git -C "${toolchain_repo}" sparse-checkout set "${CLANG_VERSION}"
          git -C "${toolchain_repo}" fetch --depth=1 --filter=blob:none origin \
            "${TOOLCHAIN_COMMIT}"
          git -C "${toolchain_repo}" checkout --detach FETCH_HEAD
          test "$(git -C "${toolchain_repo}" rev-parse HEAD)" = "${TOOLCHAIN_COMMIT}"
          mv "${toolchain_repo}/${CLANG_VERSION}" "${TOOLCHAIN_DIR}"
          "${TOOLCHAIN_DIR}/bin/clang" --version

      - name: Build kernel Image
        shell: bash
        run: |
          mkdir -p dist
          set -o pipefail
          bash scripts/build-kernel.sh 2>&1 | tee dist/build.log

      - name: Finalize Image audit checksums
        shell: bash
        run: |
          test -s dist/Image
          test -s dist/kernel.config
          test -s dist/build-info.txt
          test -s dist/kernel-final.diff
          test -s dist/sukisu-final-complete.diff
          test -s dist/applied-patches.txt
          test -s dist/build.log
          cd dist
          sha256sum \
            Image \
            kernel.config \
            build-info.txt \
            kernel-final.diff \
            sukisu-final-complete.diff \
            applied-patches.txt \
            build.log > SHA256SUMS

      - name: Upload Image build audit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kebab-lineage-23.2-sukisu-ultra-image-${{ env.KERNEL_SHA }}
          path: |
            dist/Image
            dist/kernel.config
            dist/build-info.txt
            dist/SHA256SUMS
            dist/kernel-final.diff
            dist/sukisu-final-complete.diff
            dist/applied-patches.txt
            dist/build.log
          if-no-files-found: warn
          compression-level: 6
          retention-days: 14
